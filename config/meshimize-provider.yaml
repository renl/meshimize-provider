# Meshimize Seed Provider Agent — Configuration
# Env vars override values here (see src/config.ts for env var mapping).

meshimize:
  server_url: "https://api.meshimize.com"
  api_key: "YOUR_MESHIMIZE_API_KEY" # Override: MESHIMIZE_API_KEY
  ws_path: "/socket/websocket"

llm:
  provider: "openai"
  model: "qwen3.5-flash"
  api_key: "YOUR_OPENAI_API_KEY" # Override: LLM_API_KEY
  # base_url: "https://api.openai.com/v1"  # Override: LLM_BASE_URL (optional — for OpenAI-compatible providers)
  max_tokens: 1000
  temperature: 0.3

embedding:
  provider: "openai"
  model: "text-embedding-v4"
  api_key: "YOUR_OPENAI_API_KEY" # Override: EMBEDDING_API_KEY
  # base_url: "https://api.openai.com/v1"  # Override: EMBEDDING_BASE_URL (optional — for OpenAI-compatible providers)
  dimensions: 1024
  batch_size: 10 # Override: EMBEDDING_BATCH_SIZE
  requests_per_minute: 3000

vector_store:
  provider: "chromadb"
  persist_directory: "http://localhost:8000" # ChromaDB server URL (not a filesystem path)
  collection_prefix: "meshimize"
  distance_metric: "cosine"
  stale_days: 7

agent:
  queue_max_depth: 50
  reconnect_delays_ms: [1000, 2000, 5000, 10000, 30000]
  health_port: 8080
  health_summary_interval_s: 300
  shutdown_timeout_ms: 10000
  log_level: "info"

groups:
  - group_id: "00000000-0000-0000-0000-000000000001" # Override: GROUP_ID
    group_name: "Fly.io Docs" # Override: GROUP_NAME
    slug: "fly-docs"
    docs_path: "./docs-source/fly-docs"
    chunk_size: 1000
    chunk_overlap: 200
    top_k: 5
    max_concurrency: 2

  - group_id: "00000000-0000-0000-0000-000000000002" # Override: GROUP_2_ID — set to actual group ID before deploying
    group_name: "Elixir Docs" # Override: GROUP_2_NAME
    slug: "elixir-docs"
    docs_path: "./docs-source/elixir-docs"
    chunk_size: 1000
    chunk_overlap: 200
    top_k: 5
    max_concurrency: 2
    system_prompt: >-
      You are an expert on the Elixir programming language and its standard library.
      Answer questions using ONLY the provided context from the official Elixir documentation.
      Your knowledge covers the core Elixir language, Mix (build tool), ExUnit (testing framework),
      IEx (interactive shell), Logger, and EEx (templating engine).
      When answering, be precise about module names, function signatures, and options.
      Include code examples where helpful. If the context does not contain enough information
      to answer the question, say so rather than guessing.
      Always cite the specific module or guide page you are referencing.
